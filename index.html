<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Flashcard ภาษา</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF8F0;
    --card-bg: #ffffff;
    --text: #2D2D2D;
    --text-muted: #888;
    --th: #E85D75;
    --en: #3B82F6;
    --ja: #F59E0B;
    --radius: 20px;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  header {
    background: #fff;
    padding: 16px 20px 12px;
    border-bottom: 2px solid #FFE8D6;
    position: sticky; top: 0; z-index: 10;
  }
  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 26px;
    color: var(--th);
    letter-spacing: 0.5px;
  }
  header p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* Filter bar */
  .filters {
    display: flex; gap: 8px; align-items: center;
    padding: 12px 20px;
    overflow-x: auto;
    background: #fff;
    border-bottom: 1px solid #f0e8e0;
    -webkit-overflow-scrolling: touch;
  }
  .filters::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid #ddd;
    font-size: 13px;
    font-weight: 600;
    background: #fff;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Nunito', sans-serif;
  }
  .chip.active { background: var(--th); border-color: var(--th); color: #fff; }
  .chip-en.active { background: var(--en); border-color: var(--en); }
  .chip-ja.active { background: var(--ja); border-color: var(--ja); }
  .chip-cat.active { background: #7C3AED; border-color: #7C3AED; }
  .divider { width: 1px; height: 24px; background: #eee; flex-shrink: 0; }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 14px;
    padding: 16px 20px 100px;
  }

  /* Card */
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    position: relative;
    border: 2px solid transparent;
  }
  .card:active { transform: scale(0.94); }
  .card.playing { border-color: #1D9E75; box-shadow: 0 0 0 4px rgba(29,158,117,0.15); }
  .card-emoji {
    height: 110px;
    display: flex; align-items: center; justify-content: center;
    font-size: 58px;
    background: linear-gradient(135deg, #FFF0E8, #FFE0D0);
  }
  .card-body { padding: 10px 12px 12px; }
  .word-main { font-family: 'Fredoka One', cursive; font-size: 22px; line-height: 1.2; color: var(--text); }
  .word-subs { font-size: 11px; color: var(--text-muted); margin-top: 3px; line-height: 1.5; }
  .lang-badge {
    display: inline-block;
    font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 10px;
    margin-top: 6px;
  }
  .badge-th { background: #FFE4EC; color: var(--th); }
  .badge-en { background: #DBEAFE; color: #1D4ED8; }
  .badge-ja { background: #FEF3C7; color: #B45309; }

  /* Playing dot */
  .play-dot {
    position: absolute; top: 10px; right: 10px;
    width: 10px; height: 10px; border-radius: 50%;
    background: #1D9E75;
    display: none;
    animation: blink 0.7s infinite alternate;
  }
  .card.playing .play-dot { display: block; }
  @keyframes blink { from { opacity: 1; } to { opacity: 0.2; } }

  /* Status / empty */
  .status {
    grid-column: 1 / -1;
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.8;
  }
  .status strong { color: var(--text); font-size: 16px; display: block; margin-bottom: 6px; }

  /* Bottom reload bar */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #fff;
    border-top: 1px solid #f0e8e0;
    padding: 10px 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .reload-btn {
    flex: 1;
    background: var(--th);
    color: #fff;
    border: none; border-radius: 14px;
    padding: 12px;
    font-family: 'Fredoka One', cursive;
    font-size: 16px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .reload-btn:active { opacity: 0.8; }
  .count { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

  /* Code block */
  code { font-family: monospace; background: #f5f5f5; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
</style>
</head>
<body>

<header>
  <h1>🌟 Flashcard ภาษา</h1>
  <p>จิ้มการ์ดเพื่อฟังเสียงครับ</p>
</header>

<div class="filters" id="filters">
  <button class="chip active" onclick="setLang('all', this)">🌏 ทุกภาษา</button>
  <button class="chip chip-th" onclick="setLang('th', this)">🇹🇭 ไทย</button>
  <button class="chip chip-en" onclick="setLang('en', this)">🇬🇧 EN</button>
  <button class="chip chip-ja" onclick="setLang('ja', this)">🇯🇵 日本語</button>
  <div class="divider"></div>
  <span id="catChips"></span>
</div>

<div class="grid" id="grid"></div>

<div class="bottom-bar">
  <span class="count" id="count">0 การ์ด</span>
  <button class="reload-btn" onclick="loadSheet()">🔄 โหลดใหม่จาก Google Sheets</button>
</div>

<script>
// ===== แก้ลิงก์ Google Sheets ตรงนี้ =====
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQWc4mucGdyMPL7vKY7lsiJ8IaF2SCJEFtx5CJ9ZGtnCpTGlsa6UA4IUS1YBKoewZ4d3c0l3lC59tvx/pub?gid=0&single=true&output=csv";
// ==========================================

const langVoice = { th: "th-TH", en: "en-US", ja: "ja-JP" };
const langLabel = { th: "ไทย", en: "EN", ja: "日本語" };
const badgeClass = { th: "badge-th", en: "badge-en", ja: "badge-ja" };
let data = [], selectedLang = "all", selectedCat = "all", currentCard = null;

function parseCSV(text) {
  const lines = text.trim().split("\n");
  if (lines.length < 2) return [];
  const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g, "").toLowerCase());
  return lines.slice(1).map(line => {
    const cols = [];
    let cur = "", inQ = false;
    for (let c of line) {
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur); cur = ""; }
      else cur += c;
    }
    cols.push(cur);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (cols[i] || "").trim().replace(/^"|"$/g, ""); });
    return obj;
  }).filter(r => r.th || r.en || r.ja);
}

function buildCatChips() {
  const cats = ["all", ...new Set(data.map(r => r.category).filter(Boolean))];
  const catIcons = { สัตว์:"🐾", ผลไม้:"🍎", ตัวเลข:"🔢", สี:"🎨", อาหาร:"🍽️" };
  document.getElementById("catChips").innerHTML = cats.map(c =>
    `<button class="chip chip-cat ${selectedCat === c ? 'active' : ''}" onclick="setCat('${c}', this)">
      ${c === "all" ? "📚 ทั้งหมด" : (catIcons[c] || "📌") + " " + c}
    </button>`
  ).join("");
}

function setLang(lang, el) {
  selectedLang = lang;
  document.querySelectorAll(".filters .chip:not(.chip-cat)").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  render();
}

function setCat(cat, el) {
  selectedCat = cat;
  document.querySelectorAll(".chip-cat").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  render();
}

function speak(text, lang, el) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  if (currentCard && currentCard !== el) currentCard.classList.remove("playing");
  el.classList.add("playing");
  currentCard = el;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang; u.rate = 0.82; u.pitch = 1.1;
  u.onend = u.onerror = () => { el.classList.remove("playing"); currentCard = null; };
  window.speechSynthesis.speak(u);
}

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  if (!data.length) return;
  const filtered = data.filter(r => selectedCat === "all" || r.category === selectedCat);
  const langs = selectedLang === "all" ? ["th","en","ja"] : [selectedLang];
  let count = 0;
  filtered.forEach(r => {
    langs.forEach(lang => {
      const word = r[lang]; if (!word) return;
      const subs = ["th","en","ja"].filter(l => l !== lang).map(l => r[l]).filter(Boolean).join("  ·  ");
      const emoji = r.emoji || "📖";
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="play-dot"></div>
        <div class="card-emoji">${emoji}</div>
        <div class="card-body">
          <div class="word-main">${word}</div>
          ${subs ? `<div class="word-subs">${subs}</div>` : ""}
          <span class="lang-badge ${badgeClass[lang]}">${langLabel[lang]}</span>
        </div>`;
      card.onclick = () => speak(word, langVoice[lang], card);
      grid.appendChild(card);
      count++;
    });
  });
  document.getElementById("count").textContent = count + " การ์ด";
}

async function loadSheet() {
  const grid = document.getElementById("grid");
  grid.innerHTML = `<div class="status"><strong>กำลังโหลด...</strong>ดึงข้อมูลจาก Google Sheets</div>`;
  document.getElementById("count").textContent = "...";
  try {
    const res = await fetch(CSV_URL + "&t=" + Date.now());
    const text = await res.text();
    data = parseCSV(text);
    if (!data.length) throw new Error("empty");
    buildCatChips();
    render();
  } catch(e) {
    grid.innerHTML = `
      <div class="status">
        <strong>ยังไม่มีข้อมูลครับ</strong>
        กรอกข้อมูลใน Google Sheets ให้มีหัวตาราง:<br><br>
        <code>th</code> &nbsp; <code>en</code> &nbsp; <code>ja</code> &nbsp; <code>category</code> &nbsp; <code>emoji</code><br><br>
        แล้วกดปุ่ม <strong>โหลดใหม่</strong> ด้านล่างครับ
      </div>`;
    document.getElementById("count").textContent = "0 การ์ด";
  }
}

loadSheet();
</script>
</body>
</html>
